services:
  - type: web
    name: construction-inventory-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: construction-inventory-db
          property: connectionString

databases:
  - name: construction-inventory-db
