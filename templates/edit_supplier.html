{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 mt-4" style="border-radius: 15px; overflow: hidden;">
    <!-- HEADER with Gradient -->
    <div class="card-header"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between;">
        <h5 class="mb-0" style="font-weight: 700; font-size: 24px; letter-spacing: 0.5px;">
            <i class="bi bi-pencil-square" style="margin-right: 10px;"></i>Edit Supplier
        </h5>
        <a href="{{ url_for('suppliers') }}" class="btn"
            style="background: rgba(255, 255, 255, 0.2); color: white; border: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; text-decoration: none;"
            onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.3)'"
            onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.2)'">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <!-- BODY -->
    <div class="card-body"
        style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%); padding: 30px;">
        <form method="POST" class="row g-3">
            <div class="col-md-4">
                <label for="name" class="form-label fw-semibold"
                    style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Supplier Name</label>
                <input id="name" type="text" name="name" class="form-control" value="{{ supplier.name }}" required
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>

            <div class="col-md-4">
                <label for="contact" class="form-label fw-semibold"
                    style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Contact</label>
                <input id="contact" type="text" name="contact" class="form-control" value="{{ supplier.contact }}"
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>

            <div class="col-md-4">
                <label for="address" class="form-label fw-semibold"
                    style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Address</label>
                <input id="address" type="text" name="address" class="form-control" value="{{ supplier.address }}"
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>

            <div class="col-12 text-end mt-3">
                <button type="submit" class="btn"
                    style="background: linear-gradient(135deg, #42d5b3 0%, #2db89b 100%); color: white; border: none; font-weight: 600; padding: 10px 24px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(66, 213, 179, 0.2);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(66, 213, 179, 0.35)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(66, 213, 179, 0.2)'">
                    <i class="bi bi-save"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
