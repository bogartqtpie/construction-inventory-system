{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm" style="border: none; border-radius: 15px; overflow: hidden;">
    <!-- HEADER with Gradient -->
    <div class="card-header"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 20px 30px;">
        <h5 class="mb-0" style="font-weight: 700; font-size: 24px; letter-spacing: 0.5px; color: white;">
            <i class="bi bi-truck" style="margin-right: 10px;"></i> Suppliers
        </h5>
    </div>

    <!-- ADD FORM -->
    <div class="card-body border-bottom"
        style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%); padding: 25px;">
        <form method="POST" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label mb-2" style="font-weight: 600; color: #2c3e50;">Supplier Name</label>
                <input class="form-control" name="name" placeholder="Supplier name" required
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>
            <div class="col-md-2">
                <label class="form-label mb-2" style="font-weight: 600; color: #2c3e50;">Contact</label>
                <input class="form-control" name="contact" placeholder="Contact"
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>
            <div class="col-md-3">
                <label class="form-label mb-2" style="font-weight: 600; color: #2c3e50;">Email</label>
                <input type="email" class="form-control" name="email" placeholder="supplier@example.com"
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>
            <div class="col-md-3">
                <label class="form-label mb-2" style="font-weight: 600; color: #2c3e50;">Address</label>
                <input class="form-control" name="address" placeholder="Address"
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>
            <div class="col-md-1 d-grid">
                <button class="btn"
                    style="background: linear-gradient(135deg, #42d5b3 0%, #2db89b 100%); color: white; border: none; font-weight: 600; padding: 10px 14px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(66, 213, 179, 0.2);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(66, 213, 179, 0.35)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(66, 213, 179, 0.2)'">
                    <i class="bi bi-plus-circle"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card-body p-0"
        style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%);">
        <div class="table-responsive" style="border-radius: 12px; overflow: hidden;">
            <table class="table table-hover align-middle mb-0" style="border-collapse: collapse;">
                <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <tr>
                        <th scope="col"
                            style="font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; padding: 16px;">
                            Name</th>
                        <th scope="col"
                            style="font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; padding: 16px;">
                            Contact</th>
                        <th scope="col"
                            style="font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; padding: 16px;">
                            Email</th>
                        <th scope="col"
                            style="font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; padding: 16px;">
                            Address</th>
                        <th scope="col" class="text-center"
                            style="font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; padding: 16px; width: 200px;">
                            Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in suppliers %}
                    <tr style="border-bottom: 1px solid rgba(0, 0, 0, 0.05); transition: all 0.3s ease;">
                        <td style="padding: 16px; color: #2c3e50; font-weight: 600;">{{ s.name }}</td>
                        <td style="padding: 16px; color: #2c3e50;">{{ s.contact }}</td>
                        <td style="padding: 16px; color: #2c3e50;">{{ s.email or '-' }}</td>
                        <td style="padding: 16px; color: #2c3e50;">{{ s.address }}</td>
                        <td class="text-center" style="padding: 16px;">
                            <div class="d-flex justify-content-center gap-2" style="flex-wrap: wrap;">
                                <a href="{{ url_for('edit_supplier', id=s.id) }}" class="btn"
                                    style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; font-size: 12px; text-decoration: none; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);"
                                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(102, 126, 234, 0.35)'"
                                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(102, 126, 234, 0.2)'">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <form action="{{ url_for('delete_supplier', id=s.id) }}" method="POST"
                                    onsubmit="return confirm('Are you sure you want to delete {{ s.name }}?');"
                                    style="display: inline;">
                                    <button type="submit" class="btn"
                                        style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%); color: white; border: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; font-size: 12px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(255, 107, 107, 0.2);"
                                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(255, 107, 107, 0.35)'"
                                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(255, 107, 107, 0.2)'">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center py-4" style="color: #7f8c8d;">
                            <i class="bi bi-info-circle"
                                style="font-size: 24px; margin-bottom: 10px; display: block;"></i>
                            No suppliers found.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
