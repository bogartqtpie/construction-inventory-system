{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
        <!-- HEADER with Gradient -->
        <div class="card-header"
            style="background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%); color: white; border: none; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;">
            <h5 class="mb-0" style="font-weight: 700; font-size: 24px; letter-spacing: 0.5px;">
                <i class="bi bi-arrow-repeat" style="margin-right: 10px;"></i> Order Material
            </h5>
            <a href="{{ url_for('inventory') }}" class="btn"
                style="background: rgba(255, 255, 255, 0.2); color: white; border: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease;"
                onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.3)'"
                onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.2)'">
                <i class="bi bi-arrow-left"></i> Back to Inventory
            </a>
        </div>

        <!-- BODY -->
        <div class="card-body"
            style="background: linear-gradient(135deg, rgba(243, 156, 18, 0.02) 0%, rgba(231, 76, 60, 0.02) 100%); padding: 30px;">
            <div class="mb-4"
                style="background: white; padding: 20px; border-radius: 12px; border-left: 4px solid #f39c12;">
                <h5 class="fw-semibold" style="color: #2c3e50; font-size: 20px;">{{ material.name }}</h5>
                <p style="color: #2c3e50; margin-bottom: 12px; font-size: 15px;">
                    <i class="bi bi-box" style="color: #667eea; margin-right: 8px;"></i> Current Quantity:
                    <span class="fw-bold">{{ material.quantity }} {{ material.unit }}</span>
                </p>
                <p style="color: #2c3e50; margin-bottom: 0; font-size: 15px;">
                    <i class="bi bi-exclamation-triangle" style="color: #ff6b6b; margin-right: 8px;"></i> Reorder Point:
                    <span class="fw-bold" style="color: #ff6b6b;">{{ material.reorder_point }}</span>
                </p>
            </div>

            <form method="POST" action="{{ url_for('reorder', material_id=material.id) }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="supplier" class="form-label fw-semibold"
                            style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Supplier</label>
                        <select class="form-select" id="supplier" name="supplier_id" required
                            style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                            onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
                            <option value="" selected> Select a supplier </option>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}" {% if material.supplier_id==supplier.id %}selected{% endif
                                %}>
                                {{ supplier.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="quantity" class="form-label fw-semibold"
                            style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Order Quantity</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1"
                            placeholder="Enter quantity to reorder" required
                            style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                            onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
                    </div>

                    <div class="col-md-12">
                        <label for="notes" class="form-label fw-semibold"
                            style="color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Notes (Optional)</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"
                            placeholder="Add any remarks or details about this reorder..."
                            style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px; font-family: system-ui, -apple-system, sans-serif;"
                            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                            onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'"></textarea>
                    </div>
                </div>

                <div class="mt-4 text-end">
                    <button type="submit" class="btn"
                        style="background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; border: none; font-weight: 600; padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(243, 156, 18, 0.2);"
                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(243, 156, 18, 0.35)'"
                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(243, 156, 18, 0.2)'">
                        <i class="bi bi-send"></i> Confirm Reorder
                    </button>
                    <a href="{{ url_for('inventory') }}" class="btn ms-2"
                        style="background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); color: white; border: none; font-weight: 600; padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(149, 165, 166, 0.2); text-decoration: none;"
                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(149, 165, 166, 0.35)'"
                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(149, 165, 166, 0.2)'">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
