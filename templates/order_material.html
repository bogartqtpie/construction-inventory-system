{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4" style="color: #2c3e50; font-weight: 700; font-size: 28px;">Order Material</h2>

    <!-- Material Information -->
    <div class="card mb-4 shadow-sm" style="border: none; border-radius: 15px; overflow: hidden;">
        <div class="card-body"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px;">
            <h5 class="card-title" style="font-weight: 700; font-size: 22px; margin-bottom: 16px;">{{ material.name }}
            </h5>
            <p style="margin-bottom: 10px; font-size: 15px;">
                <i class="bi bi-box" style="margin-right: 8px;"></i><strong>Current Quantity:</strong> {{
                material.quantity }} {{ material.unit }}
            </p>
            <p style="margin-bottom: 0; font-size: 15px;">
                <i class="bi bi-exclamation-triangle" style="margin-right: 8px;"></i><strong>Reorder Point:</strong> {{
                material.reorder_point }} {{ material.unit }}
            </p>
        </div>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="alert"
        style="background: #ff6b6b; color: white; border: none; border-radius: 8px; padding: 16px; margin-bottom: 24px;">
        <i class="bi bi-exclamation-triangle" style="margin-right: 8px;"></i> {{ error }}
    </div>
    {% endif %}

    <!-- Order Form -->
    <form method="POST" class="card shadow-sm" style="border: none; border-radius: 15px; overflow: hidden;">
        <div class="card-body"
            style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%); padding: 30px;">
            <div class="mb-4">
                <label for="supplier" class="form-label"
                    style="font-weight: 600; color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Select
                    Supplier</label>
                <select class="form-select" id="supplier" name="supplier_id" required
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
                    <option value="">-- Choose Supplier --</option>
                    {% for supplier in suppliers %}
                    <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label for="reorder_qty" class="form-label"
                    style="font-weight: 600; color: #2c3e50; font-size: 14px; margin-bottom: 10px;">Order
                    Quantity</label>
                <input type="number" class="form-control" id="reorder_qty" name="reorder_qty"
                    placeholder="Enter quantity to order" min="1" required
                    style="border: 1.5px solid rgba(102, 126, 234, 0.2); border-radius: 8px; padding: 10px 14px; transition: all 0.3s ease; font-size: 14px;"
                    onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
                    onblur="this.style.borderColor='rgba(102, 126, 234, 0.2)'; this.style.boxShadow='none'">
            </div>

            <div class="d-flex justify-content-between gap-3">
                <a href="{{ url_for('inventory') }}" class="btn"
                    style="background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); color: white; border: none; font-weight: 600; padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(149, 165, 166, 0.2); text-decoration: none;"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(149, 165, 166, 0.35)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(149, 165, 166, 0.2)'">Cancel</a>
                <button type="submit" class="btn"
                    style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; font-weight: 600; padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 16px rgba(102, 126, 234, 0.35)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(102, 126, 234, 0.2)'">Place
                    Order</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
