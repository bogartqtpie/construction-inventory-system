{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0"
        style="max-width: 600px; margin-left: auto; margin-right: auto; border-radius: 15px; overflow: hidden;">
        <!-- HEADER with Gradient -->
        <div class="card-header"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 30px; text-align: center;">
            <h3 class="fw-bold mb-0" style="font-size: 28px; letter-spacing: 0.5px; color: white;">About This System
            </h3>
        </div>

        <!-- BODY -->
        <div class="card-body text-center"
            style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%); padding: 40px;">
            <p style="color: #2c3e50; margin-bottom: 20px; font-size: 16px; line-height: 1.6;">
                <strong>Construction Inventory & POS Web Application</strong><br>
                <span style="color: #7f8c8d;">Designed for managing material stock, suppliers, and sales
                    efficiently.</span>
            </p>
            <hr style="border: none; border-top: 2px solid rgba(102, 126, 234, 0.2); margin: 30px 0;">
            <p style="color: #2c3e50; margin-bottom: 8px; font-size: 15px;">
                <strong>Developed by:</strong> Patrick Siapno
            </p>
            <p style="color: #7f8c8d; margin-bottom: 20px; font-size: 14px;">
                AMACC East Rizal — Thesis Project
            </p>
            <span class="badge"
                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;">Version
                1.0</span>
        </div>
    </div>
</div>
{% endblock %}
