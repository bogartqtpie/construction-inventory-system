{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
    <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 20px 30px;">
      <h5 class="mb-0" style="font-weight: 700; font-size: 20px;">
        <i class="bi bi-database-add"></i> Inventory Seed
      </h5>
    </div>
    <div class="card-body" style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%);">
      <p style="color:#2c3e50;">
        Paste your inventory text here. Each material header must include <code>(category: ...)</code> and <code>reorder point</code>.
        The importer will create/update materials and variants.
      </p>

      <form method="POST">
        <div class="mb-3">
          <label for="seed_text" class="form-label fw-semibold">Seed text</label>
          <textarea
            id="seed_text"
            name="seed_text"
            class="form-control"
            rows="18"
            placeholder="Paste your inventory lines..."
            required
            style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 12px;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="bi bi-play-fill"></i> Import / Upsert
        </button>
      </form>

      {% if results %}
      <hr />
      <div class="alert alert-info" style="white-space: pre-wrap;">
        {{ results }}
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
