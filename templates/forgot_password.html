{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="mb-3 text-center">Forgotten your password?</h4>
                <p class="text-muted small">
                    Enter your email address below and we will email instructions for a new one.
                </p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" name="email" class="form-control" value="{{ email or '' }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">SEND PASSWORD RESET LINK</button>
                </form>
                <p class="mt-3 mb-0 text-center">
                    Remembered your password? <a href="{{ url_for('login') }}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
