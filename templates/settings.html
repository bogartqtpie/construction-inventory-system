{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
        <!-- HEADER with Gradient -->
        <div class="card-header"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 20px 30px;">
            <h2 class="mb-0" style="font-weight: 700; font-size: 28px; letter-spacing: 0.5px;">
                <i class="bi bi-gear" style="margin-right: 12px;"></i>System Settings
            </h2>
        </div>

        <!-- BODY -->
        <div class="card-body"
            style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%); padding: 40px;">
            <div style="text-align: center; padding: 40px;">
                <i class="bi bi-sliders"
                    style="font-size: 48px; color: #667eea; margin-bottom: 16px; display: block;"></i>
                <p style="color: #2c3e50; font-size: 18px; font-weight: 600; margin-bottom: 8px;">Coming Soon</p>
                <p style="color: #7f8c8d;">This page will contain system configuration options.</p>
            </div>
        </div>
    </div>

</div>

{% endblock %}
